<script src="/shared/pixi.min.js"></script>
<script src="/sdk/experiment-sdk.js"></script>
<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const W = window.innerWidth;
const H = window.innerHeight;
const TOTAL_LAPS      = 10;
const MAX_SPEED       = 220;          // px/s at 200W
const CRAWL_SPEED     = MAX_SPEED * 0.15;
const RESTING_WATTS   = 30;
const AI_WATT_PROFILES = [75, 115, 148]; // AI difficulty levels

// Waypoints defining the oval track CENTER line (world coords, centred at origin)
// These trace a stadium-oval clockwise starting from the start/finish straight
const BASE_W = 900, BASE_H = 560;
const RX = BASE_W / 2, RY = BASE_H / 2;
const CORNER_R = 180; // radius of oval corners

function buildWaypoints() {
  const pts = [];
  const steps = 48;

  // Top straight: right to left  (y = -RY + CORNER_R)
  const topY = -RY + CORNER_R;
  for (let i = 0; i <= 6; i++) {
    pts.push({ x: RX - CORNER_R - (i / 6) * (BASE_W - 2 * CORNER_R), y: topY });
  }
  // Left top corner: 180° → 90°  (center: -RX+CORNER_R, topY)
  const lcx = -RX + CORNER_R;
  for (let i = 1; i <= 8; i++) {
    const a = Math.PI - (i / 8) * (Math.PI / 2);
    pts.push({ x: lcx + Math.cos(a) * CORNER_R, y: topY - CORNER_R + Math.sin(a) * CORNER_R });
    // Hmm, need to think about this differently — build oval arc segments
  }
  // Re-do: parametric ellipse-like shape with rounded ends
  pts.length = 0;
  const N = 60;
  for (let i = 0; i < N; i++) {
    const t = (i / N) * Math.PI * 2;
    // Superellipse-like: stretch circle into rounded rect
    const cosT = Math.cos(t), sinT = Math.sin(t);
    const px = Math.sign(cosT) * Math.min(Math.abs(RX - CORNER_R), Math.abs(cosT) * RX) + Math.sign(cosT) * Math.max(0, Math.abs(cosT) * RX - (RX - CORNER_R));
    const py = Math.sign(sinT) * Math.min(Math.abs(RY - CORNER_R), Math.abs(sinT) * RY) + Math.sign(sinT) * Math.max(0, Math.abs(sinT) * RY - (RY - CORNER_R));
    // Simpler: clamp to bounding rect
    let x = cosT * RX;
    let y = sinT * RY;
    // Normalize to get direction, then clamp each component
    pts.push({ x, y });
  }
  return pts;
}

// Clean parametric oval waypoints via smooth stadium shape
function buildOvalWaypoints(N = 64) {
  const pts = [];
  const a = BASE_W / 2 - 40;   // semi-major
  const b = BASE_H / 2 - 40;   // semi-minor
  const r = CORNER_R;

  for (let i = 0; i < N; i++) {
    const t = (i / N) * Math.PI * 2 - Math.PI / 2; // start at top
    // Stadium oval via squircle-like formula — just use ellipse for track path
    const x = Math.cos(t) * a;
    const y = Math.sin(t) * b;
    pts.push({ x, y });
  }
  // Close loop by returning to first point logically (array wraps)
  return pts;
}

const WAYPOINTS = buildOvalWaypoints(64);
const NUM_WP    = WAYPOINTS.length;

// ─── PixiJS App ───────────────────────────────────────────────────────────────
const app = new PIXI.Application({
  width: W, height: H,
  backgroundColor: 0x080c10,
  antialias: true,
  resolution: window.devicePixelRatio || 1,
  autoDensity: true,
});
document.body.appendChild(app.view);
app.view.style.position = 'fixed';
app.view.style.top = '0';
app.view.style.left = '0';

// ─── World container (camera follows player) ──────────────────────────────────
const world = new PIXI.Container();
app.stage.addChild(world);

// ─── Draw Track ───────────────────────────────────────────────────────────────
const trackLayer    = new PIXI.Container();
const carLayer      = new PIXI.Container();
const fxLayer       = new PIXI.Container();
world.addChild(trackLayer, carLayer, fxLayer);

function drawTrack() {
  const a = BASE_W / 2 - 40;
  const b = BASE_H / 2 - 40;
  const outerA = a + 80, outerB = b + 80;
  const innerA = a - 70, innerB = b - 70;

  // Grass fill (background of track area)
  const grass = new PIXI.Graphics();
  grass.beginFill(0x1a3a14);
  grass.drawEllipse(0, 0, outerA + 40, outerB + 40);
  grass.endFill();
  trackLayer.addChild(grass);

  // Road surface
  const road = new PIXI.Graphics();
  road.beginFill(0x2d2d33);
  road.drawEllipse(0, 0, outerA, outerB);
  road.endFill();
  // Cut out inner grass (inner oval)
  const innerGrass = new PIXI.Graphics();
  innerGrass.beginFill(0x1e4018);
  innerGrass.drawEllipse(0, 0, innerA, innerB);
  innerGrass.endFill();
  trackLayer.addChild(road);
  trackLayer.addChild(innerGrass);

  // Road edge lines
  const edgeLine = new PIXI.Graphics();
  edgeLine.lineStyle(3, 0x888899, 0.7);
  edgeLine.drawEllipse(0, 0, outerA, outerB);
  edgeLine.drawEllipse(0, 0, innerA, innerB);
  trackLayer.addChild(edgeLine);

  // Dashed centre line
  const centreA = (outerA + innerA) / 2;
  const centreB = (outerB + innerB) / 2;
  const dashLine = new PIXI.Graphics();
  dashLine.lineStyle(2, 0xcccc88, 0.35);
  const dashPts = 80;
  for (let i = 0; i < dashPts; i += 2) {
    const t0 = (i / dashPts) * Math.PI * 2;
    const t1 = ((i + 1) / dashPts) * Math.PI * 2;
    dashLine.moveTo(Math.cos(t0) * centreA, Math.sin(t0) * centreB);
    dashLine.lineTo(Math.cos(t1) * centreA, Math.sin(t1) * centreB);
  }
  trackLayer.addChild(dashLine);

  // Start/finish line (top of track, at angle 0 = rightmost → we start at top = -π/2)
  // Track starts at top: parametric t = -π/2 → x=0, y=-b
  const sfLine = new PIXI.Graphics();
  const sfY = -b;
  sfLine.lineStyle(0);
  // Chequered pattern (manual squares)
  const sqW = 18, sqH = 10;
  const sfX1 = 0 - (outerA - innerA) / 2;
  const cols = Math.ceil((outerA - innerA) / sqW);
  for (let col = 0; col < cols; col++) {
    for (let row = 0; row < 2; row++) {
      const isBlack = (col + row) % 2 === 0;
      sfLine.beginFill(isBlack ? 0x111111 : 0xffffff);
      sfLine.drawRect(sfX1 + col * sqW, sfY - sqH + row * sqH, sqW, sqH);
      sfLine.endFill();
    }
  }
  trackLayer.addChild(sfLine);
  sfLine.x = -cols * sqW / 2;

  // Inner decoration: grass circle
  const innerDeco = new PIXI.Graphics();
  innerDeco.beginFill(0x174812, 1);
  innerDeco.lineStyle(2, 0x2a6020, 1);
  innerDeco.drawEllipse(0, 0, innerA - 10, innerB - 10);
  innerDeco.endFill();
  // Pit lane label
  const pitLabel = new PIXI.Text('MICRO SPRINT', {
    fontFamily: 'Courier New', fontSize: 28, fill: 0x4a8040,
    fontWeight: 'bold', letterSpacing: 4,
  });
  pitLabel.anchor.set(0.5);
  pitLabel.x = 0; pitLabel.y = 0;
  trackLayer.addChild(innerDeco, pitLabel);

  // Kerb strips (alternating red/white along outer edge at start straight tangent)
  const kerbG = new PIXI.Graphics();
  const kerbSegs = 8;
  for (let i = 0; i < kerbSegs; i++) {
    const t = -Math.PI / 2 - 0.15 + (i / kerbSegs) * 0.30;
    const x = Math.cos(t) * outerA;
    const y = Math.sin(t) * outerB;
    kerbG.beginFill(i % 2 === 0 ? 0xff3333 : 0xffffff);
    kerbG.drawRect(x - 6, y - 14, 12, 28);
    kerbG.endFill();
  }
  trackLayer.addChild(kerbG);
}

drawTrack();

// ─── Car helpers ─────────────────────────────────────────────────────────────
const CAR_COLORS = [0x00ccff, 0xff4422, 0xffcc00, 0x88ff44];
const CAR_NAMES  = ['YOU', 'REX', 'MIA', 'KAI'];

function makeCar(colorHex, isPlayer) {
  const g = new PIXI.Container();

  // Car body
  const body = new PIXI.Graphics();
  body.beginFill(colorHex);
  body.drawRoundedRect(-14, -22, 28, 44, 5);
  body.endFill();
  // Windshield
  body.beginFill(0x000000, 0.5);
  body.drawRoundedRect(-9, -18, 18, 14, 3);
  body.endFill();
  // Wheels
  body.beginFill(0x222222);
  [[-14, -16], [14, -16], [-14, 14], [14, 14]].forEach(([wx, wy]) => {
    body.drawRoundedRect(wx - 5, wy - 5, 10, 10, 2);
  });
  body.endFill();

  // Direction marker (front dot)
  body.beginFill(0xffffff, 0.8);
  body.drawCircle(0, -20, 3);
  body.endFill();

  if (isPlayer) {
    // Highlight rim
    body.lineStyle(2, 0xffffff, 0.3);
    body.drawRoundedRect(-14, -22, 28, 44, 5);
    body.lineStyle(0);
  }

  g.addChild(body);

  // Name tag
  const tag = new PIXI.Text(isPlayer ? 'YOU' : '', {
    fontFamily: 'Courier New', fontSize: 10, fill: 0xffffff,
  });
  tag.anchor.set(0.5, 1);
  tag.y = -26;
  g.addChild(tag);

  return g;
}

// ─── Cars state ──────────────────────────────────────────────────────────────
const TotalCars = 4;

const carsState = [
  { id: 0, progress: 0, laps: 0, speed: 0, gfx: null, isPlayer: true, watts: 0, aiWatts: 0, aiDrift: 0, aiDriftTimer: 0 },
  { id: 1, progress: -0.06, laps: 0, speed: 0, gfx: null, isPlayer: false, watts: AI_WATT_PROFILES[0], aiWatts: AI_WATT_PROFILES[0], aiDrift: 0, aiDriftTimer: 0 },
  { id: 2, progress: -0.12, laps: 0, speed: 0, gfx: null, isPlayer: false, watts: AI_WATT_PROFILES[1], aiWatts: AI_WATT_PROFILES[1], aiDrift: 0, aiDriftTimer: 0 },
  { id: 3, progress: -0.18, laps: 0, speed: 0, gfx: null, isPlayer: false, watts: AI_WATT_PROFILES[2], aiWatts: AI_WATT_PROFILES[2], aiDrift: 0, aiDriftTimer: 0 },
];

// Create car graphics
carsState.forEach((car, i) => {
  car.gfx = makeCar(CAR_COLORS[i], car.isPlayer);
  carLayer.addChild(car.gfx);
});

// ─── Waypoint interpolation ───────────────────────────────────────────────────
function getPositionOnTrack(progress) {
  // progress = 0..1 per lap (wraps)
  const t = ((progress % 1) + 1) % 1;
  const floatIdx = t * NUM_WP;
  const idxA = Math.floor(floatIdx) % NUM_WP;
  const idxB = (idxA + 1) % NUM_WP;
  const frac = floatIdx - Math.floor(floatIdx);
  const wA = WAYPOINTS[idxA], wB = WAYPOINTS[idxB];
  return {
    x: wA.x + (wB.x - wA.x) * frac,
    y: wA.y + (wB.y - wA.y) * frac,
  };
}

function getHeadingOnTrack(progress) {
  const t = ((progress % 1) + 1) % 1;
  const floatIdx = t * NUM_WP;
  const idxA = Math.floor(floatIdx) % NUM_WP;
  const idxB = (idxA + 1) % NUM_WP;
  const wA = WAYPOINTS[idxA], wB = WAYPOINTS[idxB];
  return Math.atan2(wB.y - wA.y, wB.x - wA.x) + Math.PI / 2; // +90° so car points forward
}

// ─── Game state ───────────────────────────────────────────────────────────────
let currentWatts = 0;
let currentSpm   = 0;
let playerLaps   = 0;
let gameOver     = false;
let sessionDone  = false;
let lastPosition = 4;

let bannerTimer  = null;
function showBanner(msg, color = '#fff') {
  const el = document.getElementById('banner');
  el.textContent = msg;
  el.style.color = color;
  el.style.opacity = '1';
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => { el.style.opacity = '0'; }, 2400);
}

function setLedByPosition(pos) {
  if      (pos === 1) sdk.setLedPreset(3); // green = leading
  else if (pos <= 3)  sdk.setLedPreset(4); // yellow = mid
  else                sdk.setLedPreset(6); // red = last
}

// ─── Speed trails (motion blur) ───────────────────────────────────────────────
const trails = [];
function spawnTrail(x, y, color, alpha) {
  const g = new PIXI.Graphics();
  g.beginFill(color, alpha);
  g.drawCircle(0, 0, 4);
  g.endFill();
  g.x = x; g.y = y;
  fxLayer.addChild(g);
  trails.push({ gfx: g, life: 0.22, maxLife: 0.22 });
}

function updateTrails(dt) {
  for (let i = trails.length - 1; i >= 0; i--) {
    const t = trails[i];
    t.life -= dt;
    if (t.life <= 0) { fxLayer.removeChild(t.gfx); trails.splice(i, 1); continue; }
    t.gfx.alpha = (t.life / t.maxLife) * 0.35;
    t.gfx.scale.set(t.life / t.maxLife);
  }
}

// Victory explosion
function spawnVictoryBurst(x, y) {
  for (let i = 0; i < 24; i++) {
    const g = new PIXI.Graphics();
    const col = [0xffcc44, 0xff4422, 0x00ccff, 0x88ff44][i % 4];
    g.beginFill(col, 1); g.drawCircle(0, 0, 5 + Math.random() * 6); g.endFill();
    g.x = x; g.y = y;
    fxLayer.addChild(g);
    const angle = (Math.PI * 2 * i) / 24;
    const spd = 120 + Math.random() * 160;
    trails.push({
      gfx: g,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 1.2, maxLife: 1.2,
      isBurst: true,
    });
  }
}

// ─── Minimap ──────────────────────────────────────────────────────────────────
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx    = mmCanvas.getContext('2d');
mmCanvas.width  = 120;
mmCanvas.height = 120;
const MM_CX = 60, MM_CY = 60;
const MM_A  = 44, MM_B  = 30;

function drawMinimap() {
  mmCtx.clearRect(0, 0, 120, 120);
  // Background
  mmCtx.fillStyle = 'rgba(0,0,0,0.5)';
  mmCtx.fillRect(0, 0, 120, 120);
  // Track oval
  mmCtx.strokeStyle = '#555';
  mmCtx.lineWidth = 6;
  mmCtx.beginPath();
  mmCtx.ellipse(MM_CX, MM_CY, MM_A, MM_B, 0, 0, Math.PI * 2);
  mmCtx.stroke();
  // Inner oval
  mmCtx.strokeStyle = '#333';
  mmCtx.lineWidth = 1;
  mmCtx.beginPath();
  mmCtx.ellipse(MM_CX, MM_CY, MM_A - 14, MM_B - 10, 0, 0, Math.PI * 2);
  mmCtx.stroke();

  // Cars
  carsState.forEach((car, i) => {
    const t = ((car.progress % 1) + 1) % 1;
    const angle = t * Math.PI * 2 - Math.PI / 2;
    const mmx = MM_CX + Math.cos(angle) * MM_A;
    const mmy = MM_CY + Math.sin(angle) * MM_B;
    mmCtx.beginPath();
    const r = car.isPlayer ? 5 : 3;
    const hex = CAR_COLORS[i];
    const rc  = (hex >> 16) & 0xff;
    const gc  = (hex >> 8)  & 0xff;
    const bc  = hex & 0xff;
    mmCtx.fillStyle = `rgb(${rc},${gc},${bc})`;
    mmCtx.arc(mmx, mmy, r, 0, Math.PI * 2);
    mmCtx.fill();
    if (car.isPlayer) {
      mmCtx.strokeStyle = '#fff';
      mmCtx.lineWidth = 1.5;
      mmCtx.stroke();
    }
  });
}

// ─── Update HUD ───────────────────────────────────────────────────────────────
function updateHUD(playerPos) {
  document.getElementById('pos-value').textContent = `P${playerPos}`;
  document.getElementById('lap-value').textContent = `${Math.min(playerLaps, TOTAL_LAPS)}/${TOTAL_LAPS}`;
  document.getElementById('watts-display').textContent = Math.round(currentWatts);
  document.getElementById('spm-display').textContent   = Math.round(currentSpm);

  // Position colour
  const posEl = document.getElementById('pos-value');
  if      (playerPos === 1) posEl.style.color = '#44ff88';
  else if (playerPos <= 3)  posEl.style.color = '#ffcc44';
  else                      posEl.style.color = '#ff4422';

  // LED
  if (!sessionDone) setLedByPosition(playerPos);
}

// ─── Main game loop ───────────────────────────────────────────────────────────
let trailTimer = 0;

app.ticker.add((delta) => {
  if (gameOver) return;
  const dt = delta / 60;

  // ── Update car positions ──
  carsState.forEach((car, i) => {
    let targetWatts;
    if (car.isPlayer) {
      targetWatts = currentWatts;
    } else {
      // AI: drift watts every 5s
      car.aiDriftTimer -= dt;
      if (car.aiDriftTimer <= 0) {
        car.aiDrift     = (Math.random() - 0.5) * 20;
        car.aiDriftTimer = 4 + Math.random() * 3;
      }
      targetWatts = car.aiWatts + car.aiDrift;
    }

    // Speed: watts/150 × MAX_SPEED, floor at CRAWL if low watts
    const isResting = targetWatts < RESTING_WATTS;
    const rawSpeed  = isResting
      ? CRAWL_SPEED
      : Math.min(MAX_SPEED, (targetWatts / 150) * MAX_SPEED);

    car.speed = rawSpeed;

    // Progress per second = speed / (track circumference) — so 1 lap takes TRK seconds
    const trackCircumference = Math.PI * 2 * Math.sqrt((BASE_W / 2 * BASE_W / 2 + BASE_H / 2 * BASE_H / 2) / 2);
    const progressPerSec = rawSpeed / trackCircumference;
    const prevProg = car.progress;
    car.progress += progressPerSec * dt;

    // Lap detection
    if (car.isPlayer) {
      const prevLap = Math.floor(prevProg);
      const currLap = Math.floor(car.progress);
      if (currLap > prevLap) {
        car.laps = currLap;
        playerLaps = car.laps;
        if (playerLaps <= TOTAL_LAPS) {
          showBanner(`🏁 Lap ${Math.min(playerLaps, TOTAL_LAPS)} / ${TOTAL_LAPS}!`, '#ffcc44');
        }
        if (playerLaps >= TOTAL_LAPS) {
          triggerVictory(car);
          return;
        }
      }
    }

    // World position
    const lapProgress = ((car.progress % 1) + 1) % 1;
    const pos = getPositionOnTrack(lapProgress);
    car.gfx.x = pos.x;
    car.gfx.y = pos.y;
    car.gfx.rotation = getHeadingOnTrack(lapProgress);
  });

  // ── Camera: centre on player, orient forward ──
  const playerCar = carsState[0];
  world.x = W / 2 - playerCar.gfx.x;
  world.y = H / 2 - playerCar.gfx.y;

  // ── Position ranking ──
  const sorted = carsState.slice().sort((a, b) => b.progress - a.progress);
  const playerPos = sorted.findIndex(c => c.isPlayer) + 1;

  if (playerPos !== lastPosition) {
    if (playerPos < lastPosition) showBanner(['🔥 Overtake!', '⚡ Moving up!'][Math.floor(Math.random() * 2)], '#44ffcc');
    lastPosition = playerPos;
  }

  // ── Speed trails ──
  trailTimer += dt;
  if (trailTimer >= 0.04 && playerCar.speed > CRAWL_SPEED * 2) {
    trailTimer = 0;
    spawnTrail(playerCar.gfx.x, playerCar.gfx.y, CAR_COLORS[0], 0.6);
  }

  // ── Trail/burst particle update ──
  updateTrails(dt);

  // Traverse trails array for burst particles (those with vx/vy)
  for (let i = trails.length - 1; i >= 0; i--) {
    const t = trails[i];
    if (t.isBurst) {
      t.life -= dt;
      if (t.life <= 0) { fxLayer.removeChild(t.gfx); trails.splice(i, 1); continue; }
      t.gfx.x += t.vx * dt;
      t.gfx.y += t.vy * dt;
      t.gfx.alpha = t.life / t.maxLife;
    }
  }

  // ── HUD & minimap ──
  updateHUD(playerPos);
  drawMinimap();
});

// ─── Victory ─────────────────────────────────────────────────────────────────
function triggerVictory(playerCar) {
  if (sessionDone) return;
  sessionDone = true;
  gameOver    = true;
  showBanner('🏆 YOU WIN!', '#ffcc44');
  spawnVictoryBurst(playerCar.gfx.x + world.x - W / 2, playerCar.gfx.y + world.y - H / 2);
  sdk.markComplete();
  setTimeout(() => {
    document.getElementById('rating-screen').style.display = 'flex';
  }, 2200);
}

// ─── SDK ─────────────────────────────────────────────────────────────────────
const sdk = new ExperimentSDK({
  onStroke(data) {
    currentWatts = data.watts;
    currentSpm   = data.spm;
  },
  onInterval(data) {
    currentWatts = data.watts;
    currentSpm   = data.spm;
  },
  onSessionEnd() {
    if (!sessionDone) sdk.quit();
  },
});

sdk.addEventListener('connectionStatus', (e) => {
  const el = document.getElementById('connection');
  el.textContent = e.detail.connected ? '🟢 Connected' : '🔴 Disconnected';
});

// ─── Rating screen ────────────────────────────────────────────────────────────
document.querySelectorAll('.star-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    const r = parseInt(btn.dataset.r, 10);
    document.querySelectorAll('.star-btn').forEach((b, i) => {
      b.style.color = i < r ? '#ffcc44' : '#555';
    });
    await sdk.submitRating(r);
    setTimeout(() => { document.getElementById('rating-screen').style.display = 'none'; }, 600);
  });
});
</script>
