<!-- manifest: {"type":"pacer","difficulty":"easy","tags":["breathing","recovery","mindful"]} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Row</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #001529;
    color: #fff;
    font-family: 'Georgia', serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #sky {
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom, #001529 0%, #003d6b 60%, #006994 100%);
    transition: background 4s ease;
  }

  /* Stars */
  #stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }

  /* Waves */
  #ocean {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 35vh;
    overflow: hidden;
  }

  .wave {
    position: absolute;
    bottom: 0;
    left: -100%;
    width: 300%;
    height: 100px;
    background: rgba(0, 150, 200, 0.3);
    border-radius: 40% 60% 60% 40% / 50%;
    animation: wave-anim 8s linear infinite;
  }

  .wave:nth-child(2) {
    animation-duration: 6s;
    animation-delay: -2s;
    opacity: 0.5;
    background: rgba(0, 180, 220, 0.2);
  }

  .wave:nth-child(3) {
    animation-duration: 10s;
    animation-delay: -5s;
    opacity: 0.3;
  }

  @keyframes wave-anim {
    0%   { transform: translateX(0) scaleY(1); }
    50%  { transform: translateX(25%) scaleY(1.1); }
    100% { transform: translateX(0) scaleY(1); }
  }

  /* Boat */
  #boat {
    position: fixed;
    bottom: calc(35vh - 30px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 4em;
    transition: transform 0.3s ease;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    animation: bob 4s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { bottom: calc(35vh - 28px); }
    50%       { bottom: calc(35vh - 35px); }
  }

  /* Breathing orb */
  #breath-orb {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100,220,255,0.8), rgba(0,100,200,0.3));
    box-shadow: 0 0 40px rgba(100,220,255,0.4);
    transition: transform 4s ease-in-out, opacity 0.5s;
  }

  #breath-text {
    position: fixed;
    top: calc(30% + 80px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.1em;
    opacity: 0.7;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* HUD */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 16px 24px;
    background: rgba(0,0,0,0.3);
    font-size: 0.9em;
  }

  #pace-guide {
    position: fixed;
    bottom: calc(35vh + 20px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.85em;
    opacity: 0.6;
    text-align: center;
  }

  /* Stroke ripple */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 2px solid rgba(100,220,255,0.6);
    pointer-events: none;
    animation: ripple-out 1s ease-out forwards;
  }

  @keyframes ripple-out {
    0%   { width: 20px; height: 20px; opacity: 0.8; margin-left: -10px; margin-top: -10px; }
    100% { width: 200px; height: 200px; opacity: 0; margin-left: -100px; margin-top: -100px; }
  }

  #distance-display {
    position: fixed;
    bottom: calc(35vh + 50px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.8em;
    font-weight: bold;
    color: #64dcff;
    text-shadow: 0 0 20px #64dcff;
  }

  /* End screen */
  #end-screen {
    display: none;
    position: fixed;
    inset: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0, 21, 41, 0.95);
    gap: 20px;
    text-align: center;
    z-index: 200;
  }

  #end-screen h2 { font-size: 2.5em; color: #64dcff; }
  #end-screen p { font-size: 1.1em; opacity: 0.8; }

  .rating-buttons { display: flex; gap: 12px; margin-top: 10px; }
  .rating-btn {
    width: 50px; height: 50px; border-radius: 50%;
    border: 2px solid #64dcff; background: transparent;
    color: #fff; font-size: 1.3em; cursor: pointer;
    transition: background 0.2s;
  }
  .rating-btn:hover, .rating-btn.selected {
    background: #64dcff; color: #001529;
  }
</style>
</head>
<body>
<script src="/shared/nav.js"></script>

<div id="sky"></div>
<canvas id="stars"></canvas>

<div id="ocean">
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
</div>

<div id="boat">⛵</div>

<div id="breath-orb"></div>
<div id="breath-text">Breathe in</div>

<div id="distance-display">0 m</div>
<div id="pace-guide">Row at an easy, sustainable pace</div>

<div id="hud">
  <span id="connection">⚪ Connecting...</span>
  <span id="elapsed-display">0:00</span>
  <span>SPM: <span id="spm-display">0</span></span>
</div>

<div id="end-screen">
  <h2>🌊 Journey Complete</h2>
  <p id="end-stats"></p>
  <p>How was the experience?</p>
  <div class="rating-buttons">
    <button class="rating-btn" data-rating="1">1</button>
    <button class="rating-btn" data-rating="2">2</button>
    <button class="rating-btn" data-rating="3">3</button>
    <button class="rating-btn" data-rating="4">4</button>
    <button class="rating-btn" data-rating="5">5</button>
  </div>
</div>

<script src="/sdk/experiment-sdk.js"></script>
<script>
  // ── Star field ────────────────────────────────────────────────────────────
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const stars = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height * 0.6,
    r: Math.random() * 1.5 + 0.3,
    a: Math.random(),
  }));

  function drawStars(opacity) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a * opacity})`;
      ctx.fill();
    });
  }

  // ── Breathing animation ───────────────────────────────────────────────────
  const breathOrb = document.getElementById('breath-orb');
  const breathText = document.getElementById('breath-text');
  let breathPhase = 'in';  // 'in' | 'hold' | 'out'
  let breathTimer = 0;
  const BREATH_IN_S = 4;
  const BREATH_HOLD_S = 2;
  const BREATH_OUT_S = 6;

  function tickBreath() {
    breathTimer++;
    if (breathPhase === 'in' && breathTimer >= BREATH_IN_S) {
      breathPhase = 'hold';
      breathTimer = 0;
      breathText.textContent = 'Hold';
      breathOrb.style.transform = 'translate(-50%, -50%) scale(1.5)';
    } else if (breathPhase === 'hold' && breathTimer >= BREATH_HOLD_S) {
      breathPhase = 'out';
      breathTimer = 0;
      breathText.textContent = 'Breathe out';
      breathOrb.style.transform = 'translate(-50%, -50%) scale(1)';
    } else if (breathPhase === 'out' && breathTimer >= BREATH_OUT_S) {
      breathPhase = 'in';
      breathTimer = 0;
      breathText.textContent = 'Breathe in';
      breathOrb.style.transform = 'translate(-50%, -50%) scale(0.8)';
    } else if (breathPhase === 'in' && breathTimer === 1) {
      breathOrb.style.transform = 'translate(-50%, -50%) scale(1.5)';
    }
  }

  // ── Day/night cycle based on elapsed time ────────────────────────────────
  function updateSky(elapsedS) {
    const pct = Math.min(1, elapsedS / (20 * 60));  // full cycle over 20 minutes
    const starOpacity = 1 - pct;
    drawStars(starOpacity);

    const sky = document.getElementById('sky');
    if (pct < 0.5) {
      // Night → dawn
      const t = pct * 2;
      sky.style.background = `linear-gradient(to bottom, 
        hsl(${210 + t * 30}, 80%, ${10 + t * 30}%) 0%, 
        hsl(${200 + t * 20}, 70%, ${20 + t * 25}%) 60%, 
        hsl(${190}, 60%, ${30 + t * 15}%) 100%)`;
    } else {
      // Dawn → day
      const t = (pct - 0.5) * 2;
      sky.style.background = `linear-gradient(to bottom, 
        hsl(${210 + t * 20}, 60%, ${50 + t * 15}%) 0%, 
        hsl(${200 + t * 10}, 70%, ${55 + t * 10}%) 60%, 
        hsl(${185}, 80%, ${55 + t * 10}%) 100%)`;
    }
  }

  // ── Ripple effect on stroke ───────────────────────────────────────────────
  function createRipple() {
    const r = document.createElement('div');
    r.className = 'ripple';
    r.style.left = '50%';
    r.style.top = `${window.innerHeight - window.innerHeight * 0.35 - 20}px`;
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 1000);
  }

  // ── Distance calc (rough: 1 stroke ≈ 8m at 22 SPM) ──────────────────────
  let totalDistance = 0;

  function strokeToMeters(spm) {
    // Very rough: at 22 SPM and ~150W each stroke ≈ 7-9m
    return 8;
  }

  function formatTime(s) {
    return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
  }

  // Session end flag
  const SESSION_DURATION_S = 20 * 60;   // 20-minute easy row

  // ── SDK ────────────────────────────────────────────────────────────────────
  let sdk;

  sdk = new ExperimentSDK({
    onStroke: (data) => {
      totalDistance += strokeToMeters(data.spm);
      document.getElementById('distance-display').textContent = `${Math.round(totalDistance)} m`;
      document.getElementById('spm-display').textContent = data.spm;
      createRipple();

      // Gentle pace guide based on SPM
      const paceGuide = document.getElementById('pace-guide');
      if (data.spm < 18) paceGuide.textContent = 'A little faster — find your rhythm';
      else if (data.spm > 26) paceGuide.textContent = 'Ease up — breathe and flow';
      else paceGuide.textContent = 'Perfect pace — keep flowing';
    },

    onInterval: (data, elapsedS) => {
      document.getElementById('elapsed-display').textContent = formatTime(elapsedS);
      tickBreath();
      updateSky(elapsedS);

      if (elapsedS >= SESSION_DURATION_S) {
        sdk.markComplete();
      }
    },

    onSessionEnd: (summary) => {
      document.getElementById('end-screen').style.display = 'flex';
      document.getElementById('end-stats').textContent =
        `${Math.round(totalDistance)}m rowed · ${summary.totalStrokes} strokes · ${formatTime(summary.durationS)}`;
    },
  });

  // Initial star draw
  drawStars(1);

  // Connection status
  window.addEventListener('connectionStatus', (e) => {
    document.getElementById('connection').textContent =
      e.detail.connected ? '🟢 Connected' : '🔴 Disconnected';
  });

  // Rating buttons
  let ratingDone = false;
  document.querySelectorAll('.rating-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (ratingDone) return;
      ratingDone = true;
      document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      await sdk.submitRating(parseInt(btn.dataset.rating));
    });
  });
</script>
</body>
</html>
