<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Row</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --gold: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --text: #f3f4f6;
    --muted: #6b7280;
    --border: rgba(255,255,255,0.08);
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── Header ────────────────────────────────────────────────────── */
  header {
    background: linear-gradient(135deg, #0f1f3d 0%, #0a1628 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1.4em;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent2); }

  .header-stats {
    display: flex;
    gap: 24px;
    font-size: 0.85em;
    color: var(--muted);
  }

  .header-stats b { color: var(--text); }

  /* ── Main layout ───────────────────────────────────────────────── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
  }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; }
  }

  /* ── Sections ──────────────────────────────────────────────────── */
  section { margin-bottom: 32px; }

  .section-title {
    font-size: 0.75em;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-title .badge {
    background: var(--accent);
    color: white;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 0.85em;
    letter-spacing: 0;
    text-transform: none;
  }

  /* ── Recommendation card ───────────────────────────────────────── */
  #recommendation-card {
    background: linear-gradient(135deg, #1e3a5f 0%, #1a2235 100%);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .rec-icon { font-size: 2em; flex-shrink: 0; }

  .rec-content h3 {
    font-size: 0.8em;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .rec-content p { font-size: 0.95em; line-height: 1.5; color: var(--text); }

  .rec-meta {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .rec-chip {
    background: rgba(59,130,246,0.15);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 0.8em;
    color: var(--accent2);
  }

  /* ── Experiment cards ──────────────────────────────────────────── */
  .experiment-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .experiment-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    text-decoration: none;
    color: inherit;
    display: block;
    position: relative;
    overflow: hidden;
  }

  .experiment-card:hover {
    transform: translateY(-2px);
    border-color: rgba(59,130,246,0.4);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .experiment-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.15s;
  }

  .experiment-card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .card-name {
    font-size: 1em;
    font-weight: 600;
    line-height: 1.3;
  }

  .score-badge {
    background: var(--surface2);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 0.85em;
    font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
    margin-left: 8px;
  }

  .card-desc {
    font-size: 0.85em;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 14px;
  }

  .card-footer {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .tag {
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 0.75em;
    color: var(--muted);
  }

  .type-badge {
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 0.75em;
    font-weight: 600;
  }

  .type-game  { background: rgba(59,130,246,0.2); color: #60a5fa; }
  .type-pacer { background: rgba(6,182,212,0.2);  color: #67e8f9; }
  .type-ai    { background: rgba(139,92,246,0.2); color: #c4b5fd; }

  .new-badge {
    background: var(--green);
    color: white;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 0.75em;
    font-weight: 700;
  }

  .play-count { font-size: 0.75em; color: var(--muted); margin-left: auto; }

  /* Pending card */
  .experiment-card.pending {
    border-style: dashed;
    border-color: rgba(139,92,246,0.4);
  }

  .pending-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 0.85em;
    font-weight: 600;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.85; }
  .btn-approve { background: var(--green); color: white; }
  .btn-preview { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-reject  { background: transparent; color: var(--red); border: 1px solid var(--red); }

  /* ── Sidebar ───────────────────────────────────────────────────── */
  .sidebar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .sidebar-title {
    font-size: 0.75em;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* Recent sessions */
  .session-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85em;
  }

  .session-row:last-child { border-bottom: none; }

  .session-date { color: var(--muted); font-size: 0.9em; }

  .session-stat {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--text);
    font-weight: 500;
  }

  .completed-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .incomplete-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  /* Stat tiles */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-tile {
    background: var(--surface2);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }

  .stat-tile .val {
    font-size: 1.6em;
    font-weight: 700;
    color: var(--accent2);
    display: block;
  }

  .stat-tile .lbl {
    font-size: 0.72em;
    color: var(--muted);
    margin-top: 2px;
    display: block;
  }

  /* ── Preview modal ─────────────────────────────────────────────── */
  #preview-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #preview-modal.open { display: flex; }

  .modal-box {
    background: var(--surface);
    border-radius: var(--radius);
    width: 100%;
    max-width: 900px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-header h3 { font-size: 1em; }

  .modal-actions { display: flex; gap: 8px; }

  #preview-frame {
    flex: 1;
    border: none;
    background: #000;
    min-height: 500px;
  }

  .close-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 0.9em;
  }

  /* ── Loading / empty states ────────────────────────────────────── */
  .loading {
    text-align: center;
    color: var(--muted);
    padding: 40px;
    font-size: 0.9em;
  }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 30px;
    font-size: 0.9em;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">🚣 Clean<span>Row</span></div>
  <div class="header-stats">
    <span>Sessions: <b id="total-sessions">—</b></span>
    <span>Strokes: <b id="total-strokes">—</b></span>
  </div>
</header>

<main>
  <!-- Left: main content -->
  <div>
    <!-- AI recommendation -->
    <div id="recommendation-card" style="display:none">
      <div class="rec-icon">🤖</div>
      <div class="rec-content">
        <h3>Today's Session Recommendation</h3>
        <p id="rec-text"></p>
        <div class="rec-meta" id="rec-meta"></div>
      </div>
    </div>

    <!-- Active experiments -->
    <section id="active-section">
      <div class="section-title">
        Experiments
        <span class="badge" id="active-count">—</span>
      </div>
      <div class="experiment-grid" id="active-grid">
        <div class="loading"><span class="spinner"></span>Loading...</div>
      </div>
    </section>

    <!-- Pending review -->
    <section id="pending-section" style="display:none">
      <div class="section-title">
        Pending Review (AI Generated)
        <span class="badge" id="pending-count" style="background:#7c3aed">—</span>
      </div>
      <div class="experiment-grid" id="pending-grid"></div>
    </section>
  </div>

  <!-- Right: sidebar -->
  <aside>
    <div class="sidebar-card">
      <div class="sidebar-title">Stats</div>
      <div class="stat-grid">
        <div class="stat-tile">
          <span class="val" id="stat-sessions">—</span>
          <span class="lbl">Sessions</span>
        </div>
        <div class="stat-tile">
          <span class="val" id="stat-strokes">—</span>
          <span class="lbl">Strokes</span>
        </div>
      </div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-title">Recent Sessions</div>
      <div id="sessions-list">
        <div class="loading"><span class="spinner"></span>Loading...</div>
      </div>
    </div>

    <div class="sidebar-card" style="text-align:center">
      <div class="sidebar-title">AI Tools</div>
      <button class="btn btn-approve" style="width:100%;margin-bottom:8px" onclick="generateExperiment()">
        ✨ Generate Experiment
      </button>
      <button class="btn btn-preview" style="width:100%" onclick="generateRecommendation()">
        📊 Refresh Recommendation
      </button>
      <p id="ai-status" style="font-size:0.8em;color:var(--muted);margin-top:10px"></p>
    </div>
  </aside>
</main>

<!-- Preview modal -->
<div id="preview-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="preview-title">Preview</h3>
      <div class="modal-actions">
        <button class="btn btn-approve" id="modal-approve-btn">✓ Activate</button>
        <button class="btn btn-reject"  id="modal-reject-btn">✕ Reject</button>
        <button class="close-btn" onclick="closePreview()">Close</button>
      </div>
    </div>
    <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
</div>

<script>
  const API = '/api';
  let dashData = null;
  let previewExpId = null;

  // ── Fetch dashboard ───────────────────────────────────────────────────────
  async function loadDashboard() {
    try {
      const res = await fetch(`${API}/dashboard`);
      if (!res.ok) throw new Error(res.status);
      dashData = await res.json();
      renderDashboard(dashData);
    } catch (e) {
      document.getElementById('active-grid').innerHTML =
        '<div class="empty">Could not connect to backend. Is Docker running?</div>';
    }
  }

  function renderDashboard(data) {
    // Header stats
    document.getElementById('total-sessions').textContent = data.total_sessions.toLocaleString();
    document.getElementById('total-strokes').textContent  = data.total_strokes.toLocaleString();
    document.getElementById('stat-sessions').textContent  = data.total_sessions;
    document.getElementById('stat-strokes').textContent   = data.total_strokes.toLocaleString();

    // Recommendation
    if (data.next_session_recommendation) {
      document.getElementById('rec-text').textContent = data.next_session_recommendation;
      document.getElementById('recommendation-card').style.display = 'flex';
    }

    // Active experiments
    document.getElementById('active-count').textContent = data.active_experiments.length;
    const activeGrid = document.getElementById('active-grid');
    if (data.active_experiments.length === 0) {
      activeGrid.innerHTML = '<div class="empty">No active experiments yet. Activate one from the pending queue, or generate one with AI.</div>';
    } else {
      activeGrid.innerHTML = data.active_experiments.map(renderActiveCard).join('');
    }

    // Pending experiments
    if (data.pending_experiments.length > 0) {
      document.getElementById('pending-section').style.display = 'block';
      document.getElementById('pending-count').textContent = data.pending_experiments.length;
      document.getElementById('pending-grid').innerHTML = data.pending_experiments.map(renderPendingCard).join('');
    }

    // Recent sessions
    renderSessions(data.recent_sessions);
  }

  function renderActiveCard(exp) {
    const score = exp.composite_score != null
      ? `<span class="score-badge">${Math.round(exp.composite_score)}</span>`
      : '';
    const isNew = exp.play_count === 0
      ? '<span class="new-badge">NEW</span>'
      : '';
    const isAI = exp.generated_by && exp.generated_by.startsWith('ai');
    const aiBadge = isAI ? '<span class="type-badge type-ai">AI</span>' : '';
    const tags = (exp.manifest.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
    const typeClass = `type-${exp.type}`;
    // Human experiments: link to static file. AI experiments: open inline runner.
    const href = isAI
      ? `runner.html?experiment=${exp.slug}`
      : `/experiments/${exp.slug}/index.html?experiment=${exp.slug}`;

    return `
      <a class="experiment-card" href="${href}">
        <div class="card-header">
          <div class="card-name">${exp.name}</div>
          ${score}
        </div>
        <div class="card-desc">${exp.description || ''}</div>
        <div class="card-footer">
          <span class="type-badge ${typeClass}">${exp.type}</span>
          ${aiBadge}
          ${isNew}
          ${tags}
          <span class="play-count">${exp.play_count} plays</span>
        </div>
      </a>`;
  }

  function renderPendingCard(exp) {
    return `
      <div class="experiment-card pending" id="card-${exp.id}">
        <div class="card-header">
          <div class="card-name">${exp.name}</div>
          <span class="type-badge type-ai">AI</span>
        </div>
        <div class="card-desc">${exp.description || 'AI-generated experiment awaiting review.'}</div>
        <div class="pending-actions">
          <button class="btn btn-preview" onclick="previewExperiment('${exp.id}', '${exp.name}')">👁 Preview</button>
          <button class="btn btn-approve" onclick="activateExperiment('${exp.id}')">✓ Activate</button>
          <button class="btn btn-reject"  onclick="rejectExperiment('${exp.id}')">✕</button>
        </div>
      </div>`;
  }

  function renderSessions(sessions) {
    const el = document.getElementById('sessions-list');
    if (!sessions || sessions.length === 0) {
      el.innerHTML = '<div class="empty" style="padding:16px">No sessions yet. Row something!</div>';
      return;
    }
    el.innerHTML = sessions.map(s => {
      const date = new Date(s.started_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      const duration = s.duration_s ? `${Math.floor(s.duration_s / 60)}m` : '—';
      const watts = s.avg_watts ? `${Math.round(s.avg_watts)}W` : '—';
      const dot = s.completed
        ? '<span class="completed-dot" title="Completed"></span>'
        : '<span class="incomplete-dot" title="Incomplete"></span>';
      return `
        <div class="session-row">
          ${dot}
          <span class="session-date">${date}</span>
          <span class="session-stat">${duration}</span>
          <span class="session-stat" style="color:var(--accent2)">${watts}</span>
        </div>`;
    }).join('');
  }

  // ── Activation / rejection ────────────────────────────────────────────────
  async function activateExperiment(id) {
    try {
      const res = await fetch(`${API}/experiments/${id}/activate`, { method: 'POST' });
      if (res.ok) {
        document.getElementById(`card-${id}`)?.remove();
        await loadDashboard();
      }
    } catch (e) { console.error(e); }
  }

  async function rejectExperiment(id) {
    try {
      const res = await fetch(`${API}/experiments/${id}/archive`, { method: 'POST' });
      if (res.ok) {
        document.getElementById(`card-${id}`)?.remove();
      }
    } catch (e) { console.error(e); }
  }

  // ── Preview modal ─────────────────────────────────────────────────────────
  async function previewExperiment(id, name) {
    previewExpId = id;
    document.getElementById('preview-title').textContent = name;
    document.getElementById('preview-modal').classList.add('open');

    // Fetch HTML content and load into sandbox iframe
    const res = await fetch(`${API}/experiments`);
    // We need the slug to load — fetch detail
    const detailRes = await fetch(`${API}/experiments/${id}`);
    if (detailRes.ok) {
      const exp = await detailRes.json();
      const iframe = document.getElementById('preview-frame');
      iframe.srcdoc = exp.html_content;
    }

    document.getElementById('modal-approve-btn').onclick = () => activateExperiment(id).then(closePreview);
    document.getElementById('modal-reject-btn').onclick  = () => rejectExperiment(id).then(closePreview);
  }

  function closePreview() {
    document.getElementById('preview-modal').classList.remove('open');
    document.getElementById('preview-frame').srcdoc = '';
    previewExpId = null;
  }

  // Close modal on backdrop click
  document.getElementById('preview-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('preview-modal')) closePreview();
  });

  // ── AI tools ──────────────────────────────────────────────────────────────
  async function generateExperiment() {
    const statusEl = document.getElementById('ai-status');
    statusEl.textContent = '⏳ Generating experiment (this may take a minute)...';
    try {
      const res = await fetch(`${API}/ai/generate-experiment`, { method: 'POST' });
      if (res.ok) {
        statusEl.textContent = '✅ Experiment generated — check pending queue!';
        await loadDashboard();
      } else {
        statusEl.textContent = '❌ Generation failed. Is ollama running?';
      }
    } catch (e) {
      statusEl.textContent = '❌ Could not reach backend.';
    }
    setTimeout(() => { statusEl.textContent = ''; }, 5000);
  }

  async function generateRecommendation() {
    const statusEl = document.getElementById('ai-status');
    statusEl.textContent = '⏳ Getting recommendation...';
    try {
      const res = await fetch(`${API}/ai/recommend-session`, { method: 'POST' });
      if (res.ok) {
        statusEl.textContent = '✅ Recommendation updated!';
        await loadDashboard();
      } else {
        statusEl.textContent = '❌ Failed. Is ollama running?';
      }
    } catch (e) {
      statusEl.textContent = '❌ Could not reach backend.';
    }
    setTimeout(() => { statusEl.textContent = ''; }, 5000);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadDashboard();
</script>
</body>
</html>
