services:
  postgres:
    image: postgres:16-alpine
    container_name: cleanrow-postgres
    environment:
      POSTGRES_DB: cleanrow
      POSTGRES_USER: cleanrow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cleanrow_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5433}:5432" # offset so it doesn't clash with AI hub postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleanrow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cleanrow-backend
    environment:
      DATABASE_URL: postgresql://cleanrow:${POSTGRES_PASSWORD:-cleanrow_dev}@postgres:5432/cleanrow
      OLLAMA_URL: ${OLLAMA_URL:-http://host-gateway:11434}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    restart: unless-stopped
    extra_hosts:
      - "host-gateway:host-gateway" # allows container to reach host services (ollama)

  web:
    image: nginx:alpine
    container_name: cleanrow-web
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: cleanrow-net
