<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Row — Experiment Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #runner-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: rgba(0,0,0,0.9);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-family: system-ui, sans-serif;
    color: white;
    font-size: 0.85em;
    flex-shrink: 0;
    z-index: 10;
  }

  #exp-title { font-weight: 600; }

  #back-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85em;
  }

  #back-btn:hover { background: rgba(255,255,255,0.1); }

  #experiment-frame {
    flex: 1;
    border: none;
    width: 100%;
    /* sandbox: allow scripts (need JS) and same-origin (need fetch to /api) */
    /* Note: allow-same-origin is needed for SDK fetch calls to backend */
  }

  #loading-overlay {
    position: fixed;
    inset: 0;
    background: #0a0e1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: system-ui, sans-serif;
    gap: 16px;
    z-index: 100;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="runner-bar">
  <button id="back-btn" onclick="history.back()">← Dashboard</button>
  <span id="exp-title">Loading experiment...</span>
  <span id="runner-status" style="color:#6b7280">—</span>
</div>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p>Loading experiment...</p>
</div>

<iframe
  id="experiment-frame"
  sandbox="allow-scripts allow-same-origin"
  allow="autoplay"
></iframe>

<script>
  const API = '/api';
  const params = new URLSearchParams(location.search);
  const slug = params.get('experiment');

  async function loadExperiment() {
    if (!slug) {
      document.getElementById('loading-overlay').innerHTML =
        '<p style="color:#ef4444">No experiment specified.</p>';
      return;
    }

    try {
      const res = await fetch(`${API}/experiments/${slug}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const exp = await res.json();

      document.getElementById('exp-title').textContent = exp.name;
      document.title = `${exp.name} — Clean Row`;

      const frame = document.getElementById('experiment-frame');

      // Inject SDK path fix: rewrite relative /sdk/ to absolute
      let html = exp.html_content;
      // Ensure SDK script src is absolute
      html = html.replace(
        /src=["']\/sdk\/experiment-sdk\.js["']/g,
        'src="/sdk/experiment-sdk.js"'
      );

      frame.srcdoc = html;
      document.getElementById('loading-overlay').style.display = 'none';
      document.getElementById('runner-status').textContent = '● Live';
      document.getElementById('runner-status').style.color = '#10b981';

    } catch (e) {
      document.getElementById('loading-overlay').innerHTML =
        `<p style="color:#ef4444">Failed to load experiment: ${e.message}</p>
         <button onclick="history.back()" style="margin-top:12px;padding:8px 20px;background:#3b82f6;border:none;color:white;border-radius:8px;cursor:pointer">Go back</button>`;
    }
  }

  loadExperiment();
</script>
</body>
</html>
