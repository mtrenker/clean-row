<!-- manifest: {"type":"race","difficulty":"medium","tags":["speed","compete"],"metric_weights":{"watts":0.4,"completion":0.3,"fun":0.3}} -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Circuit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0010;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
  #connection {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.85em;
    background: rgba(0,0,0,0.55);
    padding: 6px 18px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }
  #position-display {
    position: absolute;
    top: 16px;
    left: 20px;
    background: rgba(0,0,0,0.55);
    padding: 12px 20px;
    border-radius: 14px;
  }
  #pos-label {
    font-size: 0.7em;
    color: #ff00cc;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  #pos-value {
    font-size: 3.2em;
    font-weight: bold;
    color: #fff;
    line-height: 1;
  }
  #pos-total {
    font-size: 0.85em;
    color: #888;
  }
  #speed-display {
    position: absolute;
    top: 16px;
    right: 20px;
    background: rgba(0,0,0,0.55);
    padding: 12px 20px;
    border-radius: 14px;
    text-align: right;
  }
  #speed-label {
    font-size: 0.7em;
    color: #00ffff;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  #speed-value {
    font-size: 3.2em;
    font-weight: bold;
    color: #fff;
    line-height: 1;
  }
  #speed-unit {
    font-size: 0.85em;
    color: #888;
  }
  #distance-bar-wrap {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    background: rgba(0,0,0,0.55);
    padding: 14px 22px;
    border-radius: 14px;
    text-align: center;
  }
  #dist-label {
    font-size: 0.7em;
    color: #ff00cc;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  #dist-track {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  #dist-fill {
    height: 100%;
    background: linear-gradient(to right, #ff00cc, #00ffff);
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s ease;
  }
  #dist-value {
    font-size: 1em;
    color: #ccc;
  }
  #overtake-flash {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 3em;
    font-weight: bold;
    color: #00ffff;
    text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff;
    letter-spacing: 0.05em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
    text-align: center;
  }
  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,16,0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 22px;
  }
  #overlay.active { display: flex; }
  #overlay h1 {
    font-size: 4em;
    color: #ff00cc;
    text-shadow: 0 0 40px #ff00cc;
  }
  #overlay .stat-row {
    font-size: 1.4em;
    color: #ccc;
  }
  #overlay .stat-row span {
    color: #00ffff;
    font-weight: bold;
  }
  #rating-wrap {
    display: flex;
    gap: 16px;
    margin-top: 10px;
  }
  .star-btn {
    font-size: 2.5em;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.15s, transform 0.15s;
    pointer-events: all;
  }
  .star-btn:hover, .star-btn.lit { opacity: 1; transform: scale(1.2); }
  #rating-label {
    font-size: 0.9em;
    color: #888;
    margin-top: -8px;
  }
</style>
</head>
<body>
<script src="/shared/nav.js"></script>

<canvas id="c"></canvas>

<div id="hud">
  <span id="connection">⚪ Connecting...</span>

  <div id="position-display">
    <div id="pos-label">Position</div>
    <div id="pos-value">P8</div>
    <div id="pos-total">of 8</div>
  </div>

  <div id="speed-display">
    <div id="speed-label">Speed</div>
    <div id="speed-value">0</div>
    <div id="speed-unit">km/h</div>
  </div>

  <div id="distance-bar-wrap">
    <div id="dist-label">Distance to Finish</div>
    <div id="dist-track"><div id="dist-fill"></div></div>
    <div id="dist-value">5000 m remaining</div>
  </div>

  <div id="overtake-flash"></div>
</div>

<div id="overlay">
  <h1 id="overlay-title">RACE COMPLETE</h1>
  <div class="stat-row">Final Position: <span id="res-pos">—</span></div>
  <div class="stat-row">Distance: <span id="res-dist">—</span></div>
  <div class="stat-row">Time: <span id="res-time">—</span></div>
  <div class="stat-row">Total Strokes: <span id="res-strokes">—</span></div>
  <div id="rating-label">Rate this experiment</div>
  <div id="rating-wrap">
    <span class="star-btn" data-r="1">★</span>
    <span class="star-btn" data-r="2">★</span>
    <span class="star-btn" data-r="3">★</span>
    <span class="star-btn" data-r="4">★</span>
    <span class="star-btn" data-r="5">★</span>
  </div>
</div>

<script src="/sdk/experiment-sdk.js"></script>
<script>
(function () {
  // ───────────── canvas setup ─────────────
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => canvas.width;
  const H = () => canvas.height;

  // ───────────── game state ─────────────
  const RACE_DIST   = 5000;  // metres
  const GHOST_COUNT = 7;
  const GHOST_PACE_W = 90;   // watts equivalent for ghost speed

  // Ghost lead distances: P7=280m ... P1=2000m ahead at start
  const GHOST_LEADS = [280, 500, 740, 1000, 1280, 1600, 2000];

  let playerDist  = 0;   // metres travelled by player
  let currentWatts = 0;
  let totalStrokes = 0;
  let finished    = false;
  let ratingDone  = false;

  // Ghost positions (in metres). Ghosts start ahead.
  const ghostDist = GHOST_LEADS.map(lead => lead);

  // Which ghosts the player has already overtaken
  const overtaken = new Array(GHOST_COUNT).fill(false);

  // Position = number of ghosts still ahead of player + 1
  function getPosition() {
    let ahead = 0;
    for (let i = 0; i < GHOST_COUNT; i++) {
      if (!overtaken[i] && ghostDist[i] > playerDist) ahead++;
    }
    return ahead + 1;
  }

  // ───────────── visuals ─────────────
  const HORIZON_Y_RATIO = 0.42; // fraction of screen height
  const VANISH_X_RATIO  = 0.5;

  // Grid scroll offset (0–1 looping)
  let gridOffset = 0;
  let lastFrameTime = performance.now();

  // Overtake message
  let overtakeMsg  = '';
  let overtakeTick = 0;  // frames remaining to show message

  // Building silhouettes (static, generated once per resize)
  let buildings = [];
  function generateBuildings() {
    buildings = [];
    const bh = H();
    const hy = bh * HORIZON_Y_RATIO;
    // Left side
    let x = 0;
    while (x < W() * 0.22) {
      const bw = 30 + Math.random() * 80;
      const height = 40 + Math.random() * 160;
      buildings.push({ side: 'left', x, y: hy - height, w: bw, h: height });
      x += bw + 10 + Math.random() * 20;
    }
    // Right side
    x = W() * 0.78;
    while (x < W()) {
      const bw = 30 + Math.random() * 80;
      const height = 40 + Math.random() * 160;
      buildings.push({ side: 'right', x, y: hy - height, w: bw, h: height });
      x += bw + 10 + Math.random() * 20;
    }
  }
  generateBuildings();
  window.addEventListener('resize', generateBuildings);

  // ───────────── draw ─────────────
  function drawFrame(now) {
    const dt = Math.min((now - lastFrameTime) / 1000, 0.1);
    lastFrameTime = now;

    if (!finished) {
      // Advance ghost distances each frame at ghost pace (m/s equivalent)
      const ghostMPerS = (GHOST_PACE_W / 150) * 40 / 0.5; // ~18 strokes/min at ghost pace
      for (let i = 0; i < GHOST_COUNT; i++) {
        if (ghostDist[i] < RACE_DIST) {
          ghostDist[i] += ghostMPerS * dt * 0.28; // tuned so ghost finishes ~20 min
        }
      }

      // Scroll grid: speed proportional to current watts
      const scrollSpeed = (currentWatts / 300) * 1.4; // grid units/s
      gridOffset = (gridOffset + scrollSpeed * dt) % 1;
    }

    if (overtakeTick > 0) overtakeTick--;

    ctx.clearRect(0, 0, W(), H());

    // Sky background
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H() * HORIZON_Y_RATIO);
    skyGrad.addColorStop(0, '#0a0010');
    skyGrad.addColorStop(1, '#1a0030');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W(), H() * HORIZON_Y_RATIO);

    // Road background
    const roadGrad = ctx.createLinearGradient(0, H() * HORIZON_Y_RATIO, 0, H());
    roadGrad.addColorStop(0, '#0d0020');
    roadGrad.addColorStop(1, '#050008');
    ctx.fillStyle = roadGrad;
    ctx.fillRect(0, H() * HORIZON_Y_RATIO, W(), H() * (1 - HORIZON_Y_RATIO));

    drawBuildings();
    drawGrid();
    drawGhostCars();
    drawPlayerCar();
    drawStars();
    drawOvertakeOverlay();

    requestAnimationFrame(drawFrame);
  }

  function drawStars() {
    ctx.save();
    // Sparse star field in sky
    const seed = 1337;
    for (let i = 0; i < 80; i++) {
      const sx = ((seed * (i + 1) * 7919) % W());
      const sy = ((seed * (i + 3) * 6271) % (H() * HORIZON_Y_RATIO * 0.9));
      const brightness = 0.3 + ((i * 37) % 100) / 200;
      ctx.fillStyle = `rgba(255,${180 + (i * 13) % 75},255,${brightness})`;
      ctx.fillRect(sx, sy, 1.5, 1.5);
    }
    ctx.restore();
  }

  function drawBuildings() {
    const hy = H() * HORIZON_Y_RATIO;
    buildings.forEach(b => {
      // Glow outline only
      ctx.save();
      ctx.strokeStyle = b.side === 'left' ? 'rgba(255,0,204,0.25)' : 'rgba(0,255,255,0.25)';
      ctx.lineWidth = 1;
      ctx.shadowColor = b.side === 'left' ? '#ff00cc' : '#00ffff';
      ctx.shadowBlur = 8;
      ctx.strokeRect(b.x, b.y, b.w, b.h);
      // Window dots
      ctx.fillStyle = b.side === 'left' ? 'rgba(255,0,204,0.4)' : 'rgba(0,255,255,0.4)';
      for (let wy = b.y + 8; wy < b.y + b.h - 8; wy += 16) {
        for (let wx = b.x + 6; wx < b.x + b.w - 6; wx += 14) {
          if ((wx + wy) % 30 < 20) ctx.fillRect(wx, wy, 4, 4);
        }
      }
      ctx.restore();
    });
  }

  function drawGrid() {
    const hy  = H() * HORIZON_Y_RATIO;
    const hvx = W() * VANISH_X_RATIO;
    const numH = 14;  // horizontal grid lines
    const numV = 18;  // vertical grid lines

    ctx.save();
    ctx.shadowBlur = 6;

    // Horizontal lines (perspective-spaced, scrolling)
    for (let i = 0; i < numH; i++) {
      // t: 0 = horizon, 1 = near edge
      const tBase = i / (numH - 1);
      const t = Math.pow((tBase + gridOffset / numH) % 1, 1.8);
      const y = hy + t * (H() - hy);
      const alpha = 0.15 + t * 0.55;
      ctx.strokeStyle = `rgba(255,0,204,${alpha})`;
      ctx.shadowColor = '#ff00cc';
      ctx.lineWidth = 0.5 + t * 1.5;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W(), y);
      ctx.stroke();
    }

    // Vertical lines converging to vanishing point
    for (let i = 0; i <= numV; i++) {
      const xFrac = i / numV; // 0–1 across screen width at road base
      const xBase = xFrac * W();
      const alpha = 0.12 + 0.25 * (1 - Math.abs(xFrac - 0.5) * 2);
      ctx.strokeStyle = `rgba(0,255,255,${alpha})`;
      ctx.shadowColor = '#00ffff';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(hvx, hy);
      ctx.lineTo(xBase, H());
      ctx.stroke();
    }

    ctx.restore();
  }

  // Convert a world-position offset (metres ahead/behind player) to screen coords
  function worldToScreen(metersAhead) {
    const hy  = H() * HORIZON_Y_RATIO;
    const hvx = W() * VANISH_X_RATIO;
    const roadH = H() - hy;

    // Objects 200m ahead near horizon, 0m = player position (bottom)
    // Clamp so only things 0–220m ahead are drawn
    if (metersAhead < 0 || metersAhead > 220) return null;

    const t = 1 - metersAhead / 220; // 0 = horizon, 1 = near
    const y = hy + Math.pow(t, 1.5) * roadH;
    const scale = Math.pow(t, 1.2);
    return { x: hvx, y, scale };
  }

  function drawGhostCars() {
    // Draw from back to front (farthest first)
    for (let i = GHOST_COUNT - 1; i >= 0; i--) {
      const delta = ghostDist[i] - playerDist; // positive = ahead
      const pos = worldToScreen(delta);
      if (!pos) continue;

      const carW = 90 * pos.scale;
      const carH = 50 * pos.scale;
      const alpha = overtaken[i] ? 0.25 : 0.8;

      // Ghost car colors vary per racer
      const hues = ['#ff4444','#ff8800','#ffff00','#44ff44','#44ffff','#8844ff','#ff44bb'];
      const col  = hues[i % hues.length];

      ctx.save();
      ctx.globalAlpha = alpha;

      // Car body trapezoid
      ctx.fillStyle = col;
      ctx.shadowColor = col;
      ctx.shadowBlur = 12 * pos.scale;
      ctx.beginPath();
      ctx.moveTo(pos.x - carW * 0.35, pos.y);              // front left
      ctx.lineTo(pos.x + carW * 0.35, pos.y);              // front right
      ctx.lineTo(pos.x + carW * 0.5,  pos.y - carH * 0.4); // rear right
      ctx.lineTo(pos.x - carW * 0.5,  pos.y - carH * 0.4); // rear left
      ctx.closePath();
      ctx.fill();

      // Cab
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.beginPath();
      ctx.moveTo(pos.x - carW * 0.18, pos.y - carH * 0.4);
      ctx.lineTo(pos.x + carW * 0.18, pos.y - carH * 0.4);
      ctx.lineTo(pos.x + carW * 0.13, pos.y - carH * 0.85);
      ctx.lineTo(pos.x - carW * 0.13, pos.y - carH * 0.85);
      ctx.closePath();
      ctx.fill();

      // Taillights
      ctx.fillStyle = 'rgba(255,50,50,0.9)';
      ctx.fillRect(pos.x - carW * 0.48, pos.y - carH * 0.45, carW * 0.12, carH * 0.12);
      ctx.fillRect(pos.x + carW * 0.36, pos.y - carH * 0.45, carW * 0.12, carH * 0.12);

      ctx.restore();
    }
  }

  function drawPlayerCar() {
    const hy  = H() * HORIZON_Y_RATIO;
    const hvx = W() * VANISH_X_RATIO;
    const y   = H() - 80;
    const carW = 200;
    const carH = 110;

    ctx.save();
    ctx.shadowBlur = 30;
    ctx.shadowColor = '#ff00cc';

    // Body
    ctx.fillStyle = '#ff00cc';
    ctx.beginPath();
    ctx.moveTo(hvx - carW * 0.38, y);
    ctx.lineTo(hvx + carW * 0.38, y);
    ctx.lineTo(hvx + carW * 0.5,  y - carH * 0.38);
    ctx.lineTo(hvx - carW * 0.5,  y - carH * 0.38);
    ctx.closePath();
    ctx.fill();

    // Cab
    ctx.fillStyle = '#220033';
    ctx.beginPath();
    ctx.moveTo(hvx - carW * 0.22, y - carH * 0.38);
    ctx.lineTo(hvx + carW * 0.22, y - carH * 0.38);
    ctx.lineTo(hvx + carW * 0.16, y - carH * 0.9);
    ctx.lineTo(hvx - carW * 0.16, y - carH * 0.9);
    ctx.closePath();
    ctx.fill();

    // Headlights
    ctx.fillStyle = 'rgba(0,255,255,0.9)';
    ctx.shadowColor = '#00ffff';
    ctx.fillRect(hvx - carW * 0.46, y - carH * 0.12, carW * 0.14, carH * 0.1);
    ctx.fillRect(hvx + carW * 0.32, y - carH * 0.12, carW * 0.14, carH * 0.1);

    // Headlight beams projected forward
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#00ffff';
    ctx.beginPath();
    ctx.moveTo(hvx - carW * 0.46, y - carH * 0.07);
    ctx.lineTo(hvx - carW * 0.32, y - carH * 0.07);
    ctx.lineTo(W() * 0.35, hy + 2);
    ctx.lineTo(W() * 0.3, hy + 2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(hvx + carW * 0.32, y - carH * 0.07);
    ctx.lineTo(hvx + carW * 0.46, y - carH * 0.07);
    ctx.lineTo(W() * 0.7, hy + 2);
    ctx.lineTo(W() * 0.65, hy + 2);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawOvertakeOverlay() {
    const el = document.getElementById('overtake-flash');
    if (overtakeTick > 0) {
      el.style.opacity = Math.min(1, overtakeTick / 12).toString();
      el.textContent = overtakeMsg;
    } else {
      el.style.opacity = '0';
    }
  }

  // ───────────── HUD updates ─────────────
  function updateHUD() {
    const pos = getPosition();
    document.getElementById('pos-value').textContent = 'P' + pos;

    const kmh = Math.round(currentWatts / 1.5);
    document.getElementById('speed-value').textContent = kmh;

    const remaining = Math.max(0, RACE_DIST - playerDist);
    const pct = Math.min(100, (playerDist / RACE_DIST) * 100);
    document.getElementById('dist-fill').style.width = pct + '%';
    document.getElementById('dist-value').textContent = Math.round(remaining) + ' m remaining';
  }

  function checkOvertakes(prevDist) {
    for (let i = 0; i < GHOST_COUNT; i++) {
      if (!overtaken[i] && playerDist >= ghostDist[i]) {
        overtaken[i] = true;
        const pos = getPosition();
        overtakeMsg = `OVERTAKE!\nP${pos + 1} → P${pos}`;
        overtakeTick = 90;
      }
    }
  }

  // ───────────── session end overlay ─────────────
  function showOverlay(summary) {
    const el = document.getElementById('overlay');
    document.getElementById('overlay-title').textContent =
      playerDist >= RACE_DIST ? '🏁 FINISH LINE!' : 'SESSION OVER';

    const mins = Math.floor(summary.duration_s / 60).toString().padStart(2, '0');
    const secs = Math.floor(summary.duration_s % 60).toString().padStart(2, '0');

    document.getElementById('res-pos').textContent  = 'P' + getPosition();
    document.getElementById('res-dist').textContent  = Math.round(playerDist) + ' m';
    document.getElementById('res-time').textContent  = mins + ':' + secs;
    document.getElementById('res-strokes').textContent = summary.total_strokes;
    el.classList.add('active');
  }

  // Rating stars
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (ratingDone) return;
      ratingDone = true;
      const r = parseInt(btn.dataset.r);
      document.querySelectorAll('.star-btn').forEach((s, idx) => {
        s.classList.toggle('lit', idx < r);
      });
      await sdk.submitRating(r);
    });
  });

  // ───────────── LED ─────────────
  function updateLED(watts) {
    if (watts < 50)       sdk.setLedPreset(1);        // blue
    else if (watts < 120) sdk.setLedPreset(2);        // cyan
    else if (watts < 200) sdk.setLed(180, 0, 255);    // purple
    else                  sdk.setLed(255, 0, 100);    // hot pink
  }

  // ───────────── SDK ─────────────
  const sdk = new ExperimentSDK({
    onStroke(data) {
      if (finished) return;
      currentWatts = data.watts;
      totalStrokes = data.strokeNum;

      const prevDist = playerDist;
      const gain = Math.max(0, (data.watts / 150) * 40);
      playerDist = Math.min(RACE_DIST, playerDist + gain);

      checkOvertakes(prevDist);
      updateLED(data.watts);
      updateHUD();

      if (playerDist >= RACE_DIST && !finished) {
        finished = true;
        sdk.markComplete();
      }
    },

    onInterval(data) {
      currentWatts = data.watts;
      updateHUD();
    },

    onSessionEnd(summary) {
      finished = true;
      showOverlay(summary);
    },
  });

  // Connection status
  document.addEventListener('connectionStatus', e => {
    const el = document.getElementById('connection');
    el.textContent = e.detail.connected ? '🟢 Machine Connected' : '🔴 Disconnected';
  });

  window.addEventListener('buttonPress', e => {
    if (e.detail.type === 'longPress') sdk.quit();
  });

  // Start render loop
  requestAnimationFrame(drawFrame);
})();
</script>
</body>
</html>
